<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Monitor v4</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0c10; color: #e0e4f0; min-height: 100vh; padding: 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; }
  .subtitle { font-size: 0.8rem; color: #888; margin-top: 2px; }
  header { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-start; }
  .status-pill { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; }
  .status-pill.idle { background: #1e2230; color: #888; }
  .status-pill.running { background: #0d3320; color: #34d399; }
  .status-pill.checking { background: #1e2a0d; color: #a3e635; }
  .status-pill.alert { background: #3d1010; color: #f87171; }
  .card { background: #111318; border: 1px solid #1e2230; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .card-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 10px; }
  label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 4px; }
  input { width: 100%; background: #0a0c10; border: 1px solid #2a2f45; border-radius: 6px; color: #e0e4f0; padding: 8px 10px; font-size: 0.85rem; margin-bottom: 10px; }
  input:focus { outline: none; border-color: #4f6ef7; }
  .row { display: flex; gap: 8px; }
  .row input { flex: 1; }
  .controls { display: flex; gap: 8px; margin-top: 4px; }
  button { border: none; border-radius: 6px; padding: 10px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; flex: 1; }
  #btnStart { background: #4f6ef7; color: #fff; }
  #btnStart:disabled { background: #2a2f45; color: #666; cursor: default; }
  #btnCheck { background: #1e2230; color: #aaa; }
  #btnCheck:disabled { opacity: 0.4; cursor: default; }
  #btnStop { background: #3d1010; color: #f87171; }
  #btnStop:disabled { opacity: 0.4; cursor: default; }
  .live-event { font-size: 1.1rem; font-weight: 700; color: #34d399; min-height: 28px; }
  .blink { animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .eta { font-size: 0.8rem; color: #888; margin-top: 4px; }
  .event-list { list-style: none; }
  .event-list li { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1a1d28; font-size: 0.82rem; }
  .event-list li:last-child { border-bottom: none; }
  .badge { font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
  .badge.live { background: #0d3320; color: #34d399; }
  .badge.target { background: #2d1f00; color: #fbbf24; }
  .badge.soon { background: #1e1a30; color: #a78bfa; }
  .badge.done { background: #1a1a1a; color: #555; }
  .badge.upcoming { background: #1e2230; color: #666; }
  .log-entries { max-height: 160px; overflow-y: auto; }
  .log-entry { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid #15171f; font-size: 0.75rem; }
  .log-time { color: #555; white-space: nowrap; }
  .log-msg { color: #aaa; }
  .log-msg.err { color: #f87171; }
  .log-msg.ok { color: #34d399; }
  .log-msg.warn { color: #fbbf24; }
  .alert-banner { display: none; background: #3d1010; border: 1px solid #7f1d1d; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .alert-banner.visible { display: block; }
  .alert-title { font-size: 1rem; font-weight: 700; color: #f87171; }
  .alert-body { font-size: 0.8rem; color: #fca5a5; margin-top: 4px; }
  #btnDismiss { background: #7f1d1d; color: #fca5a5; margin-top: 10px; width: auto; padding: 6px 14px; }
  .progress-bar { height: 4px; background: #1e2230; border-radius: 2px; margin-top: 8px; }
  .progress-fill { height: 100%; background: #4f6ef7; border-radius: 2px; transition: width 1s linear; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Meet Monitor v4</h1>
    <div class="subtitle">AthleticLIVE · Girls 4×400 Alert</div>
  </div>
  <span class="status-pill idle" id="statusPill">Idle</span>
</header>

<div class="alert-banner" id="alertBanner">
  <div class="alert-title">⚠️ Target Event Approaching!</div>
  <div class="alert-body" id="alertBody"></div>
  <button id="btnDismiss">Dismiss</button>
</div>

<div class="card">
  <div class="card-label">Configuration</div>
  <label>Meet URL</label>
  <input id="meetUrl" type="url" value="https://live.finallaptiminggroup.com/meets/60830">
  <label>Target Event</label>
  <input id="targetEvent" type="text" value="Girls 4x400">
  <label>Anthropic API Key</label>
  <input id="apiKey" type="password" placeholder="sk-ant-...">
  <div class="row">
    <div style="flex:1">
      <label>Alert Before (# events)</label>
      <input id="alertBefore" type="number" value="3" min="1" max="10">
    </div>
    <div style="flex:1">
      <label>Check Every (minutes)</label>
      <input id="checkInterval" type="number" value="2" min="1" max="30">
    </div>
  </div>
  <div class="controls">
    <button id="btnStart">▶ Start</button>
    <button id="btnCheck" disabled>↻ Check Now</button>
    <button id="btnStop" disabled>■ Stop</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div style="font-size:0.72rem;color:#555;margin-top:4px;" id="nextCheckLabel"></div>
</div>

<div class="card">
  <div class="card-label">Current Live Event</div>
  <div class="live-event" id="liveEventDisplay">—</div>
  <div class="eta" id="etaDisplay"></div>
</div>

<div class="card">
  <div class="card-label">Event Schedule</div>
  <ul class="event-list" id="eventList"><li style="color:#555;font-size:0.8rem;">No data yet</li></ul>
</div>

<div class="card">
  <div class="card-label">Activity Log</div>
  <div class="log-entries" id="logEntries">
    <div class="log-entry"><span class="log-time">--:--:--</span><span class="log-msg">Ready. Configure and press Start.</span></div>
  </div>
</div>

<script>
let monitorInterval = null;
let countdownInterval = null;
let isChecking = false;
let state = {
  events: [],
  currentLiveIndex: -1,
  targetIndex: -1,
  alertFired: false,
  lastCheckTime: null,
};

function log(msg, type = '') {
  const now = new Date();
  const t = now.toTimeString().slice(0,8);
  const el = document.getElementById('logEntries');
  const row = document.createElement('div');
  row.className = 'log-entry';
  row.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
  el.insertBefore(row, el.firstChild);
  if (el.children.length > 100) el.removeChild(el.lastChild);
}

function setStatus(s) {
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill ' + s;
  pill.textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

function updateUI() {
  const liveEl = document.getElementById('liveEventDisplay');
  const etaEl = document.getElementById('etaDisplay');
  if (state.currentLiveIndex >= 0 && state.events[state.currentLiveIndex]) {
    const ev = state.events[state.currentLiveIndex];
    liveEl.innerHTML = `<span class="blink">●</span> ${ev.name}`;
  } else {
    liveEl.textContent = '—';
  }

  const ul = document.getElementById('eventList');
  if (!state.events.length) { ul.innerHTML = '<li style="color:#555;font-size:0.8rem;">No data yet</li>'; return; }

  ul.innerHTML = '';
  state.events.forEach((ev, i) => {
    const li = document.createElement('li');
    let badgeClass = 'upcoming';
    let badgeText = 'Up';
    if (i === state.currentLiveIndex) { badgeClass = 'live'; badgeText = 'Live'; }
    else if (i === state.targetIndex) { badgeClass = 'target'; badgeText = 'TARGET'; }
    else if (i < state.currentLiveIndex) { badgeClass = 'done'; badgeText = 'Done'; }
    else if (state.currentLiveIndex >= 0 && i > state.currentLiveIndex && i <= state.currentLiveIndex + 4) { badgeClass = 'soon'; badgeText = 'Soon'; }

    li.innerHTML = `<span class="badge ${badgeClass}">${badgeText}</span><span>${ev.name}</span>`;
    ul.appendChild(li);
  });

  // ETA
  if (state.targetIndex > state.currentLiveIndex && state.currentLiveIndex >= 0) {
    const eventsAway = state.targetIndex - state.currentLiveIndex;
    etaEl.textContent = `Target is ~${eventsAway} event${eventsAway !== 1 ? 's' : ''} away`;
  } else if (state.targetIndex === state.currentLiveIndex && state.currentLiveIndex >= 0) {
    etaEl.textContent = '🎯 Target event is LIVE NOW!';
  } else {
    etaEl.textContent = '';
  }
}

function checkAlert() {
  if (state.alertFired) return;
  if (state.targetIndex < 0 || state.currentLiveIndex < 0) return;
  const alertBefore = parseInt(document.getElementById('alertBefore').value) || 3;
  const eventsAway = state.targetIndex - state.currentLiveIndex;
  if (eventsAway >= 0 && eventsAway <= alertBefore) {
    state.alertFired = true;
    const banner = document.getElementById('alertBanner');
    banner.classList.add('visible');
    document.getElementById('alertBody').textContent =
      eventsAway === 0
        ? 'Your target event is LIVE RIGHT NOW!'
        : `Your target event is ${eventsAway} event${eventsAway !== 1 ? 's' : ''} away. Get ready!`;
    setStatus('alert');
    try { new Notification('Meet Monitor', { body: document.getElementById('alertBody').textContent }); } catch(e) {}
    log(`ALERT: Target event ${eventsAway === 0 ? 'is LIVE' : 'is ' + eventsAway + ' events away'}!`, 'err');
  }
}

async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function fetchMeetData() {
  const meetUrl = document.getElementById('meetUrl').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const target = document.getElementById('targetEvent').value.trim();

  if (!apiKey) throw new Error('No API key entered');

  const meetId = meetUrl.match(/meets\/([0-9]+)/)?.[1];
  if (!meetId) throw new Error('Could not extract meet ID from URL');

  log(`Fetching meet data (ID: ${meetId})...`);

  const proxies = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`,
  ];

  // Try direct API endpoints first
  const apiEndpoints = [
    `https://liveresults.trxctiming.com/api/meets/${meetId}/events`,
    `https://live.finallaptiminggroup.com/api/meets/${meetId}/events`,
    `https://live.finallaptiminggroup.com/api/meets/${meetId}`,
  ];

  for (const endpoint of apiEndpoints) {
    for (const proxy of proxies) {
      try {
        const proxyUrl = proxy(endpoint);
        log(`Trying: ${proxyUrl.slice(0,60)}...`);
        const r = await fetchWithTimeout(proxyUrl, {}, 10000);
        if (r.ok) {
          const json = await r.json();
          log('Direct API success!', 'ok');
          return parseDirectApi(json, target);
        }
        log(`Got ${r.status}, trying next...`);
      } catch(e) {
        log(`Proxy failed: ${e.message.slice(0,50)}`);
      }
    }
  }

  // Fall back to fetching HTML and asking Claude
  log('Trying HTML fetch via proxies...');
  let html = null;
  for (const proxy of proxies) {
    try {
      const proxyUrl = proxy(meetUrl);
      log(`HTML proxy: ${proxyUrl.slice(0,60)}...`);
      const htmlResp = await fetchWithTimeout(proxyUrl, {}, 12000);
      if (htmlResp.ok) {
        html = await htmlResp.text();
        log(`Got HTML (${Math.round(html.length/1024)}KB)`, 'ok');
        break;
      }
    } catch(e) {
      log(`HTML proxy failed: ${e.message.slice(0,50)}`);
    }
  }
  if (!html) throw new Error('All proxies failed — cannot reach meet page');
  log(`Got HTML (${Math.round(html.length/1024)}KB), sending to Claude...`);

  // Extract relevant portion
  const snippet = html.slice(0, 8000);

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: `This is HTML from a track meet live results page. Extract the event schedule.
Find: 1) which event is currently LIVE/active, 2) the ordered list of all events.
Target event to find: "${target}"

HTML:
${snippet}

Reply ONLY with JSON, no markdown:
{"currentLiveEvent":"<name or null>","events":[{"name":"<event name>","isLive":<true/false>}]}`
      }]
    })
  });

  log(`Claude: HTTP ${resp.status}`);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(`Claude API ${resp.status}: ${err.error?.message || 'unknown'}`);
  }

  const data = await resp.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  log(`Claude replied: ${text.slice(0, 100)}`);

  // Parse JSON from response
  const clean = text.replace(/```json|```/g, '').trim();
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Claude response had no JSON');
  const parsed = JSON.parse(jsonMatch[0]);
  return normalizeClaude(parsed, target);
}

function parseDirectApi(json, target) {
  // Handle various API shapes
  const list = Array.isArray(json) ? json : json.events || json.data || [];
  const events = list.map(e => ({
    name: e.name || e.event_name || e.title || String(e),
    isLive: !!(e.live || e.is_live || e.status === 'live' || e.status === 'active')
  }));
  return normalize(events, target);
}

function normalizeClaude(parsed, target) {
  const events = (parsed.events || []).map(e => ({
    name: e.name || '',
    isLive: !!e.isLive
  }));
  return normalize(events, target);
}

function normalize(events, target) {
  const tLow = target.toLowerCase();
  let currentLiveIndex = events.findIndex(e => e.isLive);
  let targetIndex = events.findIndex(e => e.name.toLowerCase().includes(tLow));
  return { events, currentLiveIndex, targetIndex };
}

async function doCheck() {
  if (isChecking) return;
  isChecking = true;
  setStatus('checking');
  document.getElementById('btnCheck').disabled = true;

  try {
    const result = await fetchMeetData();
    state.events = result.events;
    state.currentLiveIndex = result.currentLiveIndex;
    state.targetIndex = result.targetIndex;
    state.lastCheckTime = new Date();

    const liveName = state.currentLiveIndex >= 0 ? state.events[state.currentLiveIndex]?.name : 'none';
    const targetName = state.targetIndex >= 0 ? state.events[state.targetIndex]?.name : 'not found';
    log(`Live: "${liveName}" | Target: "${targetName}" (index ${state.targetIndex})`, 'ok');

    updateUI();
    checkAlert();
    setStatus('running');
  } catch(e) {
    log(`Error: ${e.message}`, 'err');
    setStatus('running');
  } finally {
    isChecking = false;
    document.getElementById('btnCheck').disabled = false;
  }
}

function startCountdown() {
  const intervalMin = parseInt(document.getElementById('checkInterval').value) || 2;
  const intervalMs = intervalMin * 60 * 1000;
  let elapsed = 0;
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('nextCheckLabel');

  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    elapsed += 1000;
    const pct = Math.min(100, (elapsed / intervalMs) * 100);
    fill.style.width = pct + '%';
    const remaining = Math.max(0, Math.round((intervalMs - elapsed) / 1000));
    label.textContent = `Next check in ${remaining}s`;
    if (elapsed >= intervalMs) elapsed = 0;
  }, 1000);
}

function startMonitoring() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { log('Please enter your Anthropic API key', 'err'); return; }

  const intervalMin = parseInt(document.getElementById('checkInterval').value) || 2;
  log(`Starting — checking every ${intervalMin} min`);
  setStatus('running');

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnCheck').disabled = false;
  document.getElementById('btnStop').disabled = false;

  if (Notification.permission === 'default') Notification.requestPermission();

  doCheck();
  monitorInterval = setInterval(doCheck, intervalMin * 60 * 1000);
  startCountdown();
}

function checkNow() {
  log('Manual check triggered');
  doCheck();
}

function stopMonitoring() {
  clearInterval(monitorInterval);
  clearInterval(countdownInterval);
  monitorInterval = null;
  countdownInterval = null;
  isChecking = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnCheck').disabled = true;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('nextCheckLabel').textContent = '';
  setStatus('idle');
  log('Monitoring stopped.', 'warn');
}

function dismissAlert() {
  document.getElementById('alertBanner').classList.remove('visible');
}

// Wire up buttons
document.getElementById('btnStart').addEventListener('click', startMonitoring);
document.getElementById('btnCheck').addEventListener('click', checkNow);
document.getElementById('btnStop').addEventListener('click', stopMonitoring);
document.getElementById('btnDismiss').addEventListener('click', dismissAlert);
</script>
</body>
</html>
